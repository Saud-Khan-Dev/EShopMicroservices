version: '3.8'

services:
  catalogapi:
    image: catalogapi
    build:
      context: .
      dockerfile: src/Services/Catalog/Catalog.Api/Dockerfile

    environment:
      - ConnectionStrings__Database=Server=CatalogDb;Port=5432;Database=CatalogDb;Username=postgres;Password=postgres;    
    ports:
      - 6000:8080
      - 6060:8081
    depends_on:
      - catalogdb  
    
  catalogdb:
    image: postgres:16
    environment:
      POSTGRES_DB: CatalogDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: always  
    ports:
      - "5432:5432"
    volumes:
      - postgres_catalog:/var/lib/postgresql/data

  basketapi:
    image: basketapi
    build:
      context: .
      dockerfile: src/Services/Basket/Basket.Api/Dockerfile

    environment:
      - ConnectionStrings__Database=Server=BasketDb;Port=5432;Database=BasketDb;Username=postgres;Password=postgres;    
    ports:
      - 5000:8080
      - 5052:8081
    depends_on:
      - basketdb  

  basketdb:
    image: postgres:16
    environment:
      POSTGRES_DB: BasketDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    restart: always  
    ports:
      - "5433:5432"
    volumes:
      - postgres_basket:/var/lib/postgresql/data    


  discountgrpc:
    image: discountgrpc
    build:
      context: .
      dockerfile: src/Services/Discount/Discount.Grpc/Dockerfile

    environment:
      - ConnectionStrings__Database=Data Source=/app/data/discount.db 
    ports:
      - 6002:8080
      - 6062:8081
    volumes:
            - discount_data:/app/data

  distributedcache:
    image: redis  
    container_name: distributedcache
    restart: always
    ports:
      - "6379:6379"
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      - catalogdb

volumes:
  postgres_catalog:
  postgres_basket:
  discount_data:







